<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Road Maintenance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/premium.css">
</head>
<body class="dashboard-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar py-4">
        <div class="px-4 mb-4 text-center">
            <i class="fas fa-road fa-2x mb-2 gradient-text"></i>
            <h5 class="fw-bold gradient-text m-0">RMS Portal</h5>
        </div>

        <nav class="mt-4 flex-grow-1">
            <a href="/map-view.html" class="nav-item-premium active">
                <i class="fas fa-map-marked-alt"></i> Interactive Map
            </a>
            <a href="/dashboard.html" class="nav-item-premium">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
            
            <div id="admin-sidebar" class="d-none mt-4">
                <h6 class="text-uppercase text-secondary px-4 mb-2 small fw-bold tracking-wider">Admin Controls</h6>
                <div class="px-4 mb-3">
                    <div class="glass-panel p-3">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-secondary small">Pending Complaints</span>
                            <span class="badge badge-danger" id="pending-complaints">0</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-secondary small">Active Assignments</span>
                            <span class="badge badge-info" id="active-assignments">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="engineer-sidebar" class="d-none mt-4">
                <h6 class="text-uppercase text-secondary px-4 mb-2 small fw-bold tracking-wider">Engineer Workspace</h6>
                <div class="px-4 mb-3">
                    <div class="glass-panel p-3">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-secondary small">Assigned Roads</span>
                            <span class="badge badge-info" id="assigned-count">0</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-secondary small">Pending Work</span>
                            <span class="badge badge-warning" id="pending-work">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div class="px-3 mt-auto">
            <div class="glass-panel p-3 d-flex align-items-center justify-content-between">
                <div>
                    <div class="fw-bold small text-white" id="username">Guest</div>
                    <div class="text-secondary" style="font-size: 0.75rem;" id="user-role-label">System User</div>
                </div>
                <button class="btn btn-sm btn-outline-danger border-0" id="logout-btn" title="Sign Out">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Map Container -->
        <div id="map"></div>
        
        <!-- Floating Controls Panel -->
        <div class="floating-panel">
            <div class="glass-panel-light p-4 mb-3">
                <h6 class="fw-bold text-dark mb-3"><i class="fas fa-sliders-h me-2 text-primary"></i>Map Controls</h6>
                
                <div class="mb-3">
                    <input type="text" class="form-control premium-input-light" id="road-search" placeholder="🔍 Search road name...">
                </div>
                
                <div class="mb-3">
                    <select class="form-select premium-input-light" id="condition-filter">
                        <option value="all">All Conditions</option>
                        <option value="Good">🟢 Good</option>
                        <option value="Moderate">🟡 Moderate</option>
                        <option value="Critical">🔴 Critical</option>
                    </select>
                </div>
                
                <div class="d-flex justify-content-between text-dark small pt-3 border-top border-secondary">
                    <span>Total Roads: <strong id="total-roads">0</strong></span>
                    <span>Critical: <strong class="text-danger" id="critical-roads">0</strong></span>
                </div>
            </div>
        </div>

        <!-- Offcanvas/Floating Road Details Panel (Kept original ID for map.js) -->
        <div class="road-info-panel glass-panel-light" id="road-info-panel" style="position: absolute; left: 20px; bottom: 20px; width: 450px; z-index: 1000; display: none;">
            <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                <h5 class="m-0 fw-bold text-dark"><i class="fas fa-road text-primary me-2"></i>Road Details</h5>
                <button type="button" class="btn-close" id="close-road-panel" aria-label="Close"></button>
            </div>
            <div class="p-3" id="road-info-content" style="max-height: 60vh; overflow-y: auto; color: #1e293b;">
                <!-- Populated by JS -->
            </div>
        </div>

    </main>

    <!-- Hidden elements required by map.js logic but repositioned -->
    <div id="engineer-controls" style="display: none;"></div>
    <div id="admin-controls" style="display: none;"></div>

    <!-- Loading Spinner -->
    <div class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-dark bg-opacity-75 d-none" id="loading-spinner" style="z-index: 9999;">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container" style="z-index: 1055;"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/api.js"></script>
    
    <!-- We initialize roadMap explicitly -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check auth first
            const token = sessionStorage.getItem('access_token');
            const userStr = sessionStorage.getItem('user');
            
            if (!token || !userStr) {
                window.location.href = '/';
                return;
            }
            
            const user = JSON.parse(userStr);
            document.getElementById('username').textContent = user.username;
            document.getElementById('user-role-label').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
            
            // Show appropriate sidebar
            if (user.role === 'admin') {
                document.getElementById('admin-sidebar').classList.remove('d-none');
            } else if (user.role === 'engineer') {
                document.getElementById('engineer-sidebar').classList.remove('d-none');
            }
            
            // Handle Logout
            document.getElementById('logout-btn').addEventListener('click', () => {
                sessionStorage.removeItem('access_token');
                sessionStorage.removeItem('user');
                window.location.href = '/';
            });
        });
    </script>
    <script src="/js/map.js"></script>
    <script>
        // Start the map and global object
        window.roadMap = new RoadMap();
    </script>
</body>
</html>
