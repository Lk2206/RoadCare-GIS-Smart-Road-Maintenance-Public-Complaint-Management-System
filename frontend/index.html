<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Maintenance System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/premium.css">
    <style>
        body {
            background: #0f172a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(192, 132, 252, 0.15), transparent 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            z-index: 2;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header i {
            font-size: 3rem;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        /* Abstract shapes */
        .shape {
            position: absolute;
            filter: blur(60px);
            z-index: 1;
            opacity: 0.6;
        }
        .shape-1 {
            width: 300px; height: 300px;
            background: #4f46e5;
            top: -100px; left: -100px;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out alternate;
        }
        .shape-2 {
            width: 400px; height: 400px;
            background: #c084fc;
            bottom: -150px; right: -150px;
            border-radius: 50%;
            animation: float 15s infinite ease-in-out alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(50px, 50px) rotate(20deg); }
        }

        .credentials-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-top: 30px;
            font-size: 0.85rem;
        }
        
        .credentials-card span {
            display: inline-block;
            margin-right: 15px;
        }
        
        .credentials-card i {
            color: var(--primary-color);
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="auth-container animate-fade-in-up">
        <div class="auth-header">
            <i class="fas fa-road"></i>
            <h2 class="gradient-text">Welcome Back</h2>
            <p class="text-secondary">Sign in to the Road Maintenance System</p>
        </div>

        <div class="glass-panel p-4 p-md-5">
            <form id="landingLoginForm">
                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold small text-uppercase tracking-wider">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-0 text-secondary position-absolute ms-2 mt-2 z-index-10"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control premium-input ps-5" id="loginUsername" placeholder="Enter your username" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-secondary fw-semibold small text-uppercase tracking-wider">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-0 text-secondary position-absolute ms-2 mt-2 z-index-10"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control premium-input ps-5" id="loginPassword" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-premium w-100 mt-2" id="loginBtn">
                    Sign In
                </button>
            </form>
            
            <div class="credentials-card animate-fade-in-up delay-200 text-secondary">
                <div class="mb-2 text-center border-bottom border-secondary pb-2">⚡ Quick Login</div>
                <div class="d-flex justify-content-center flex-wrap gap-2 mt-3">
                    <button type="button" class="btn btn-sm btn-outline-info" onclick="quickLogin('user', 'user123')"><i class="fas fa-user-circle me-1"></i>User</button>
                    <button type="button" class="btn btn-sm btn-outline-warning" onclick="quickLogin('admin', 'admin123')"><i class="fas fa-user-shield me-1"></i>Admin</button>
                    <button type="button" class="btn btn-sm btn-outline-success" onclick="quickLogin('engineer', 'engineer123')"><i class="fas fa-hard-hat me-1"></i>Engineer</button>
                </div>
            </div>
            
            <div class="text-center mt-4 text-secondary">
                Don't have an account? <a href="/register.html" class="text-info text-decoration-none ms-1 fw-bold">Sign up here</a>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Redirect if already logged in
            const token = sessionStorage.getItem('access_token');
            if (token) {
                window.location.href = '/map-view.html';
            }
        });

        function quickLogin(username, password) {
            document.getElementById('loginUsername').value = username;
            document.getElementById('loginPassword').value = password;
            document.getElementById('loginBtn').click();
        }

        // Handle Login
        document.getElementById('landingLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
            btn.disabled = true;

            try {
                const data = await api.login(
                    document.getElementById('loginUsername').value,
                    document.getElementById('loginPassword').value
                );
                sessionStorage.setItem('access_token', data.access_token);
                sessionStorage.setItem('user', JSON.stringify(data.user));
                
                // Add success animation before redirect
                btn.innerHTML = '<i class="fas fa-check"></i> Success';
                btn.classList.add('bg-success');
                
                setTimeout(() => {
                    window.location.href = '/map-view.html';
                }, 500);
            } catch (error) {
                btn.innerHTML = originalText;
                btn.disabled = false;
                // Toast is handled by api.js
            }
        });
    </script>
</body>
</html>
